databases:
  - name: blog-db
    plan: free
    databaseName: blog_db
    user: blog_user

services:
  - type: web
    name: blog-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.6
